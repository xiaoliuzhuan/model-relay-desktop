name: 🚀 构建和发布版本(TAURI)
on:
  push:
    tags:
      - "v2.*.*-*" # 预发布版标签格式：v2.0.0-beta.1, v2.0.0-rc.1
      - "v2.*.*" # 正式版标签：v2.0.0
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (例如: 2.0.0-beta.1)"
        required: false
        default: "2.0.0-beta.1"
      release_type:
        description: "发布类型"
        required: true
        default: "prerelease"
        type: choice
        options:
          - prerelease
          - release
      start_commit:
        description: >-
          起始提交哈希（示例：
          1234567890abcdef1234567890abcdef12345678）
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.13"

jobs:
  prepare-version:
    name: 🧮 计算版本信息
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_type: ${{ steps.version.outputs.release_type }}
      release_label: ${{ steps.version.outputs.release_label }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⚙️ 获取版本信息
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.version }}" ]; then
              VERSION="${{ github.event.inputs.version }}"
            elif command -v python3 >/dev/null 2>&1; then
              PY_VERSION_SCRIPT=$'import json\n'\
                $'from pathlib import Path\n\n'\
                $'tauri_conf = Path("src-tauri/tauri.conf.json")\n'\
                $'data = json.loads(tauri_conf.read_text(encoding="utf-8"))\n'\
                $'version = data.get("version")\n'\
                $'if not version:\n'\
                $'    raise SystemExit("Missing version in tauri.conf.json")\n'\
                $'print(version)'
              VERSION=$(python3 -c "$PY_VERSION_SCRIPT")
              echo "ℹ️ 未提供版本号，回退到 src-tauri/tauri.conf.json 中的 $VERSION"
            else
              echo "❌ 无法解析 src-tauri/tauri.conf.json，请在 workflow_dispatch 中提供版本号"
              exit 1
            fi
            TAG_NAME="v$VERSION"
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG_NAME=${GITHUB_REF#refs/tags/}
            if [[ "${TAG_NAME}" == *"-"* ]]; then
              RELEASE_TYPE="prerelease"
            else
              RELEASE_TYPE="release"
            fi
          fi

          if [ "$RELEASE_TYPE" = "release" ]; then
            RELEASE_LABEL="正式发布版"
          else
            RELEASE_LABEL="预发布版"
          fi
          RELEASE_NAME="v${VERSION}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "release_label=$RELEASE_LABEL" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

  build-macos:
    name: 🍎 构建 macOS
    needs: prepare-version
    runs-on: ${{ matrix.runner }}
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv_cache
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_BUNDLER_DEBUG: "true"
      RUST_LOG: tauri_bundler=debug
    strategy:
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            python_asset_regex: x86_64-apple-darwin
          - arch: arm64
            runner: macos-latest
            python_asset_regex: aarch64-apple-darwin

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🟢 设置 Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: 🔧 启用 Corepack
        id: pnpm-store
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
        run: |
          corepack enable
          pnpm --version
          echo "pnpm_store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: 💾 缓存 pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.pnpm_store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 🦀 设置 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🧰 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
          shared-key: tauri-${{ runner.os }}-${{ matrix.arch }}

      - name: 🔍 调试 uv.lock
        run: |
          pwd
          ls -l python-src/uv.lock || echo "python-src/uv.lock 不存在"
          head -5 python-src/uv.lock || true

      - name: 🧮 计算 uv.lock 哈希
        id: uv-lock-hash
        run: |
          if [ -f python-src/uv.lock ]; then
            echo "hash=$(shasum -a 256 python-src/uv.lock | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "hash=missing" >> "$GITHUB_OUTPUT"
            echo "⚠️ uv.lock 不存在，缓存 key 使用 missing"
          fi

      - name: 💾 缓存 uv 依赖
        uses: actions/cache@v5
        with:
          path: |
            python-src/.venv
            .uv_cache
            ~/.local/bin/uv
            ~/.local/bin/uvx
          key: ${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-uv-${{ matrix.arch }}-${{ steps.uv-lock-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-uv-${{ matrix.arch }}-

      - name: 📦 安装 uv
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # 安装脚本内部会从 GitHub 下载 release 资源，网络抖动时可能打印 curl 错误但最终退出 0，
          # 因此这里以 "uv 是否可用" 作为成功判定并重试，避免后续出现 uv: command not found。
          for i in 1 2 3; do
            if command -v uv >/dev/null 2>&1; then
              break
            fi
            echo "🔁 尝试安装 uv（第 $i 次）..."
            curl -LsSf https://astral.sh/uv/install.sh | sh || true
            sleep $((i * 5))
          done

          if ! command -v uv >/dev/null 2>&1; then
            echo "❌ uv 安装失败（多次重试后仍不可用）"
            exit 1
          fi

          uv --version

      - name: 🔧 同步 Python 依赖
        run: uv sync --project .
        working-directory: python-src

      - name: 📦 安装前端依赖
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: 📥 准备 pyembed Python
        run: |
          set -euo pipefail
          PYEMBED_DIR="src-tauri/pyembed"
          mkdir -p "$PYEMBED_DIR"
          ASSET_URL=$(gh api /repos/astral-sh/python-build-standalone/releases/latest \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --jq '.assets[] | select(.name | test("cpython-3\\.13\\..*\\+.*-'${{ matrix.python_asset_regex }}'-install_only_stripped\\.tar\\.gz")) | .browser_download_url' \
            | head -n 1)
          if [ -z "$ASSET_URL" ]; then
            echo "❌ 未找到匹配的 Python 构建产物"
            exit 1
          fi
          echo "⬇️ 下载: $ASSET_URL"
          curl -L "$ASSET_URL" -o /tmp/python-standalone.tar.gz
          tar -xzf /tmp/python-standalone.tar.gz -C "$PYEMBED_DIR"

      - name: 🧾 写入 pyembed .env
        run: |
          set -euo pipefail
          ENV_DIR="src-tauri/pyembed/python/lib/python3.13"
          mkdir -p "$ENV_DIR"
          cp .env.example "$ENV_DIR/.env"

      - name: 🛠️ 安装 Xcode Command Line Tools
        run: |
          sudo xcode-select --install || true
          # 等待安装完成或跳过如果已安装
          while ! xcode-select -p &>/dev/null; do
            echo "等待 Xcode Command Line Tools 安装..."
            sleep 10
          done

      - name: 🧰 设置 Xcode 工具路径
        run: |
          set -euo pipefail
          DEV_DIR=$(xcode-select -p)
          echo "DEV_DIR=$DEV_DIR"
          echo "$DEV_DIR/usr/bin" >> "$GITHUB_PATH"
          which SetFile || true

      - name: 🧩 安装 pytauri 依赖
        run: pnpm pytauri:install:mac
        working-directory: .

      - name: 🧱 打包 Tauri
        run: pnpm tauri:bundle:mac:ci
        working-directory: .

      - name: 🏷️ 重命名 macOS 安装包
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare-version.outputs.version }}"
          PLATFORM_TAG="apple"
          for file in src-tauri/target/bundle-release/bundle/dmg/*.dmg; do
            [ -e "$file" ] || continue
            base=$(basename "$file")
            if [[ "$base" == *"_${VERSION}_"* ]]; then
              new="${base/_${VERSION}_/_${VERSION}_${PLATFORM_TAG}_}"
              if [ "$new" != "$base" ]; then
                mv "$file" "$(dirname "$file")/$new"
              fi
            fi
          done

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.arch }}-artifacts
          path: |
            src-tauri/target/bundle-release/bundle/dmg/*.dmg
          retention-days: 7

  build-windows:
    name: 🪟 构建 Windows
    needs: prepare-version
    runs-on: windows-latest
    env:
      UV_CACHE_DIR: "${{ github.workspace }}\\.uv_cache"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6

      - name: 🐍 设置 Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🟢 设置 Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: 🔧 启用 Corepack
        id: pnpm-store
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
        run: |
          corepack enable
          pnpm --version
          $store = pnpm store path --silent
          "pnpm_store_path=$store" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 💾 缓存 pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.pnpm_store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 🦀 设置 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🧰 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
          shared-key: tauri-${{ runner.os }}-x64

      - name: 🔍 调试 uv.lock
        run: |
          Get-Location
          if (Test-Path python-src/uv.lock) {
            Get-Item python-src/uv.lock | Format-List FullName,Length
            Get-Content python-src/uv.lock -TotalCount 5
          } else {
            Write-Host "python-src/uv.lock 不存在"
          }

      - name: 🧮 计算 uv.lock 哈希
        id: uv-lock-hash
        run: |
          if (Test-Path python-src/uv.lock) {
            $hash = (Get-FileHash python-src/uv.lock -Algorithm SHA256).Hash
          } else {
            $hash = "missing"
            Write-Host "⚠️ uv.lock 不存在，缓存 key 使用 missing"
          }
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 💾 缓存 uv 依赖
        uses: actions/cache@v5
        with:
          path: |
            python-src/.venv
            .uv_cache
            ${{ env.USERPROFILE }}\.local\bin\uv.exe
            ${{ env.USERPROFILE }}\.local\bin\uvx.exe
          key: ${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-uv-win-${{ steps.uv-lock-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-uv-win-

      - name: 📦 安装 uv
        run: |
          $ErrorActionPreference = "Stop"
          $uvBinDir = Join-Path $env:USERPROFILE ".local\\bin"
          $env:PATH = "$uvBinDir;$env:PATH"
          $uvBinDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          for ($i = 1; $i -le 3; $i++) {
            if (Get-Command uv -ErrorAction SilentlyContinue) {
              break
            }
            Write-Host "🔁 尝试安装 uv（第 $i 次）..."
            try {
              Invoke-WebRequest -Uri "https://astral.sh/uv/install.ps1" -OutFile "install.ps1"
              ./install.ps1
            } catch {
              Write-Host "⚠️ uv 安装脚本执行失败: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds (5 * $i)
          }

          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            throw "uv 安装失败（多次重试后仍不可用）"
          }

          uv --version

      - name: 🔧 同步 Python 依赖
        run: uv sync --project .
        working-directory: python-src

      - name: 📦 安装前端依赖
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: 📥 准备 pyembed Python
        run: |
          $ErrorActionPreference = "Stop"
          $pyembedDir = "src-tauri/pyembed"
          New-Item -ItemType Directory -Path $pyembedDir -Force | Out-Null
          $assetUrl = gh api /repos/astral-sh/python-build-standalone/releases/latest `
            -H "Accept: application/vnd.github+json" `
            -H "X-GitHub-Api-Version: 2022-11-28" `
            --jq '.assets[] | select(.name | test("cpython-3\\.13\\..*\\+.*-x86_64-pc-windows-msvc-install_only_stripped\\.tar\\.gz")) | .browser_download_url' |
            Select-Object -First 1
          if (-not $assetUrl) { throw "❌ 未找到匹配的 Python 构建产物" }
          $archivePath = Join-Path $pyembedDir "python-standalone.tar.gz"
          Write-Host "⬇️ 下载: $assetUrl"
          Invoke-WebRequest -Uri $assetUrl -OutFile $archivePath
          tar -xzf $archivePath -C $pyembedDir

      - name: 🧾 写入 pyembed .env
        run: |
          $envDir = "src-tauri/pyembed/python/Lib"
          New-Item -ItemType Directory -Path $envDir -Force | Out-Null
          Copy-Item -Path ".env.example" -Destination (Join-Path $envDir ".env") -Force

      - name: 🧩 安装 pytauri 依赖
        run: pnpm pytauri:install:win
        working-directory: .

      - name: 🧱 打包 Tauri
        run: pnpm tauri:bundle:win:ci
        working-directory: .

      - name: 🏷️ 重命名 Windows 安装包
        run: |
          $version = "${{ needs.prepare-version.outputs.version }}"
          $tag = "windows"
          $escaped = [regex]::Escape("_${version}_")
          Get-ChildItem "src-tauri/target/bundle-release/bundle/nsis" -Filter *.exe | ForEach-Object {
            $name = $_.Name
            if ($name -match $escaped) {
              $newName = $name -replace $escaped, "_${version}_${tag}_"
              if ($newName -ne $name) {
                Rename-Item -Path $_.FullName -NewName $newName
              }
            }
          }

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v6
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/bundle-release/bundle/nsis/*.exe
          retention-days: 7

  create-release:
    name: 🚀 创建 GitHub 发布
    needs: [prepare-version, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📥 下载所有构建产物
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: 📋 列出构建产物
        run: |
          echo "🗂️ 构建产物列表:"
          find artifacts -type f \( -name "*.app" -o -name "*.dmg" -o -name "*.exe" \) | sort

      - name: 🧭 设置发布环境变量
        run: |
          echo "VERSION=${{ needs.prepare-version.outputs.version }}" >> $GITHUB_ENV
          echo "TAG_NAME=${{ needs.prepare-version.outputs.tag_name }}" >> $GITHUB_ENV
          echo "RELEASE_TYPE=${{ needs.prepare-version.outputs.release_type }}" >> $GITHUB_ENV
          echo "RELEASE_LABEL=${{ needs.prepare-version.outputs.release_label }}" >> $GITHUB_ENV
          echo "RELEASE_NAME=${{ needs.prepare-version.outputs.release_name }}" >> $GITHUB_ENV

      - name: 🏷️ 创建或更新标签
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LABEL="$RELEASE_LABEL"
          if [ "$LABEL" = "预发布版" ]; then
            EMOJI="🚀"
          else
            EMOJI="🎉"
          fi

          # 删除已存在的标签（如果有）
          git tag -d "$TAG_NAME" || true
          git push origin :refs/tags/"$TAG_NAME" || true

          # 创建新标签
          git tag -a "$TAG_NAME" \
            -m "$EMOJI $LABEL $VERSION"
          git push origin "$TAG_NAME"

      - name: 📝 生成发布说明
        id: release_notes
        run: |
          TAG_NAME="$TAG_NAME"
          START_COMMIT_INPUT="${{ github.event.inputs.start_commit || '' }}"
          TARGET_COMMIT="${{ github.sha }}"
          START_COMMIT_SOURCE="user-input"

          FEAT_TEMP=$(mktemp)
          FIX_TEMP=$(mktemp)
          STYLE_TEMP=$(mktemp)
          trap 'rm -f "$FEAT_TEMP" "$FIX_TEMP" "$STYLE_TEMP"' EXIT

          append_release_entry() {
            local subject="$1"
            local hash="$2"
            if [ -z "$subject" ]; then
              return
            fi
            if echo "$subject" | grep -Eq '^feat\b'; then
              echo "- $subject ($hash)" >> "$FEAT_TEMP"
            elif echo "$subject" | grep -Eq '^fix\b'; then
              echo "- $subject ($hash)" >> "$FIX_TEMP"
            elif echo "$subject" | grep -Eq '^style\b'; then
              echo "- $subject ($hash)" >> "$STYLE_TEMP"
            fi
          }

          if [ -z "$START_COMMIT_INPUT" ]; then
            START_COMMIT_SOURCE="previous-tag"
            TAG_PATTERN='v*'
            PREV_TAG=$(git tag -l "$TAG_PATTERN" --sort=-version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -Fvx "$TAG_NAME" | head -n 1)
            if [ -z "$PREV_TAG" ]; then
              echo "❌ 未找到上一正式版标签可用作起始提交"
              exit 1
            fi
            START_COMMIT_INPUT=$(git rev-parse "$PREV_TAG^{commit}")
            echo "ℹ️ 未提供起始提交，使用上一正式版标签 $PREV_TAG ($START_COMMIT_INPUT)"
          else
            echo "ℹ️ 使用传入的起始提交：$START_COMMIT_INPUT"
          fi
          if ! git cat-file -e "$START_COMMIT_INPUT^{commit}" 2>/dev/null; then
            echo "❌ 无法在仓库中找到起始提交：$START_COMMIT_INPUT"
            exit 1
          fi

          START_COMMIT=$(git rev-parse "$START_COMMIT_INPUT")

          if ! git merge-base --is-ancestor "$START_COMMIT" "$TARGET_COMMIT"; then
            echo "❌ 起始提交不在当前构建提交的历史中：$START_COMMIT_INPUT"
            exit 1
          fi

          START_SUBJECT=$(git show -s --format='%s' "$START_COMMIT")
          append_release_entry "$START_SUBJECT" "$START_COMMIT"
          echo "ℹ️ 发布说明范围: $START_COMMIT..$TARGET_COMMIT (起始来源: $START_COMMIT_SOURCE)"

          git log --format='%H%x09%s' --reverse "$START_COMMIT..$TARGET_COMMIT" |
            while IFS=$'\t' read -r HASH SUBJECT; do
            append_release_entry "$SUBJECT" "$HASH"
          done

          {
            echo "## :sparkles: 新功能"
            if [ -s "$FEAT_TEMP" ]; then
              cat "$FEAT_TEMP"
            else
              echo "- 暂无新功能"
            fi
            echo
            echo "## :bug: 修复"
            if [ -s "$FIX_TEMP" ]; then
              cat "$FIX_TEMP"
            else
              echo "- 暂无修复"
            fi
            echo
            echo "## :art: 界面样式"
            if [ -s "$STYLE_TEMP" ]; then
              cat "$STYLE_TEMP"
            else
              echo "- 暂无界面样式"
            fi
          } > release_notes.md

          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚀 创建 GitHub 发布
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare-version.outputs.tag_name }}
          name: ${{ needs.prepare-version.outputs.release_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          prerelease: ${{ needs.prepare-version.outputs.release_type != 'release' }}
          draft: false
          artifacts: |
            artifacts/windows-artifacts/*.exe
            artifacts/macos-x64-artifacts/*.dmg
            artifacts/macos-arm64-artifacts/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ 发布完成
        run: |
          RELEASE_LABEL="$RELEASE_LABEL"
          RELEASE_VERSION="$VERSION"
          echo "🎉 $RELEASE_LABEL v$RELEASE_VERSION 发布完成!"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME"
          echo "🔗 发布页面: $RELEASE_URL"
