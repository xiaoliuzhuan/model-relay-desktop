name: PR Gate

on:
  pull_request:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app_py_gate:
    name: App/Python Gate
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: 启用 Corepack
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
        run: |
          corepack enable
          pnpm --version

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: 设置 uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python-src/uv.lock

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 同步 Python 依赖
        run: uv sync --project .
        working-directory: python-src

      - name: App Gate
        run: pnpm gate -- app

      - name: Python Gate
        run: pnpm gate -- py

  rust_gate:
    name: Rust Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: 启用 Corepack
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
        run: |
          corepack enable
          pnpm --version

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
          shared-key: pr-gate-${{ runner.os }}

      - name: Rust Gate
        run: pnpm gate -- rs
